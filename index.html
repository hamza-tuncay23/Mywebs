<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🚀 Mon Portail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ───────────── RESET & VARIABLES ───────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-hover: #2d3a5e;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --green: #22c55e;
            --orange: #f59e0b;
            --red: #ef4444;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('background-portail.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: overlay;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.85);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        /* ───────────── ENTRY SCREEN ───────────── */
        #entryScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }

        #entryScreen .logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        #entryScreen h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        #entryScreen p {
            color: var(--text2);
            font-size: 18px;
            margin-bottom: 40px;
        }

        #entryScreen .enter-btn {
            padding: 16px 60px;
            font-size: 20px;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 24px rgba(59, 130, 246, 0.3);
        }

        #entryScreen .enter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 40px rgba(59, 130, 246, 0.5);
        }

        #entryScreen .enter-btn i {
            margin-left: 10px;
            transition: transform var(--transition);
        }

        #entryScreen .enter-btn:hover i {
            transform: translateX(6px);
        }

        /* ───────────── HUB SCREEN ───────────── */
        #hubScreen {
            display: none;
            animation: fadeIn 0.6s ease;
        }

        #hubScreen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .hub-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .hub-header .title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hub-header .title h2 {
            font-size: 28px;
            font-weight: 600;
        }

        .hub-header .title h2 span {
            color: var(--primary-light);
        }

        .hub-header .title i {
            font-size: 28px;
            color: var(--primary-light);
        }

        .hub-header .back-btn {
            padding: 10px 24px;
            border: 1px solid var(--border);
            border-radius: 40px;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 14px;
            font-weight: 500;
        }

        .hub-header .back-btn:hover {
            background: var(--card);
            color: var(--text);
            border-color: var(--primary);
        }

        /* Stats */
        .hub-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 20px;
            border: 1px solid var(--border);
            text-align: center;
            transition: all var(--transition);
        }

        .stat-card:hover {
            border-color: var(--primary);
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-light);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Categories */
        .category-section {
            margin-bottom: 32px;
        }

        .category-section .cat-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-section .cat-title i {
            color: var(--primary-light);
        }

        .category-section .cat-title .count {
            font-size: 12px;
            font-weight: 400;
            color: var(--text2);
            background: var(--card);
            padding: 2px 12px;
            border-radius: 40px;
        }

        /* ───────────── GRID CARDS ───────────── */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card-link {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px 20px;
            border: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .card-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            opacity: 0;
            transition: opacity var(--transition);
            border-radius: var(--radius);
        }

        .card-link:hover {
            transform: translateY(-6px);
            border-color: var(--primary);
            box-shadow: 0 12px 40px rgba(59, 130, 246, 0.15);
        }

        .card-link:hover::before {
            opacity: 0.08;
        }

        .card-link .icon {
            font-size: 40px;
            color: var(--primary-light);
            position: relative;
            z-index: 1;
        }

        .card-link .name {
            font-weight: 600;
            font-size: 16px;
            position: relative;
            z-index: 1;
        }

        .card-link .desc {
            font-size: 13px;
            color: var(--text2);
            position: relative;
            z-index: 1;
        }

        .card-link .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            z-index: 1;
        }

        .badge.primary {
            background: rgba(59, 130, 246, 0.2);
            color: var(--primary-light);
        }

        .badge.green {
            background: rgba(34, 197, 94, 0.2);
            color: var(--green);
        }

        .badge.purple {
            background: rgba(139, 92, 246, 0.2);
            color: var(--purple);
        }

        .badge.pink {
            background: rgba(236, 72, 153, 0.2);
            color: var(--pink);
        }

        .badge.orange {
            background: rgba(245, 158, 11, 0.2);
            color: var(--orange);
        }

        .badge.red {
            background: rgba(239, 68, 68, 0.2);
            color: var(--red);
        }

        /* ───────────── ADD CARD BUTTON ───────────── */
        .add-card {
            background: transparent;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 24px 20px;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text2);
            min-height: 140px;
        }

        .add-card:hover {
            border-color: var(--primary);
            color: var(--primary-light);
            background: rgba(59, 130, 246, 0.05);
        }

        .add-card i {
            font-size: 32px;
        }

        .add-card span {
            font-size: 14px;
            font-weight: 500;
        }

        /* ───────────── MODAL ───────────── */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9998;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border-radius: var(--radius);
            padding: 32px 36px;
            max-width: 480px;
            width: 100%;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .modal-content h2 {
            font-size: 22px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-content h2 i {
            color: var(--primary-light);
        }

        .modal-content .sub {
            color: var(--text2);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            margin-bottom: 12px;
            transition: border var(--transition);
        }

        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-content .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .modal-content .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
        }

        .modal-content .modal-buttons .btn-cancel {
            background: var(--border);
            color: var(--text2);
        }

        .modal-content .modal-buttons .btn-cancel:hover {
            background: var(--red);
            color: white;
        }

        .modal-content .modal-buttons .btn-confirm {
            background: var(--primary);
            color: white;
        }

        .modal-content .modal-buttons .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

        /* ───────────── RESPONSIVE ───────────── */
        @media (max-width: 600px) {
            #entryScreen h1 {
                font-size: 32px;
            }
            #entryScreen .logo {
                font-size: 56px;
            }
            .hub-header .title h2 {
                font-size: 20px;
            }
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 14px;
            }
            .card-link {
                padding: 18px 16px;
            }
            .card-link .icon {
                font-size: 30px;
            }
            .modal-content {
                padding: 24px 20px;
            }
        }

        @media (max-width: 400px) {
            .card-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .card-link {
                padding: 14px 12px;
            }
            .card-link .name {
                font-size: 13px;
            }
            .card-link .desc {
                font-size: 11px;
            }
        }

        /* ───────────── TOAST ───────────── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 14px 22px;
            border-radius: var(--radius);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.2);
            font-weight: 500;
            z-index: 9999;
            animation: slideUp 0.3s ease;
            max-width: 380px;
            color: var(--text);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.hidden {
            display: none;
        }

        /* ───────────── EMPTY STATE ───────────── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ═══════════ ENTRY SCREEN ═══════════ -->
        <div id="entryScreen">
            <div class="logo">🚀</div>
            <h1>Mon Portail</h1>
            <p>Tous mes outils et sites réunis en un seul endroit</p>
            <button class="enter-btn" onclick="enterHub()">
                Entrer <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <!-- ═══════════ HUB SCREEN ═══════════ -->
        <div id="hubScreen">

            <!-- Header -->
            <header class="hub-header">
                <div class="title">
                    <i class="fas fa-th-large"></i>
                    <h2>Mon <span>Hub</span></h2>
                </div>
                <button class="back-btn" onclick="exitHub()">
                    <i class="fas fa-arrow-left"></i> Retour
                </button>
            </header>

            <!-- Stats -->
            <div class="hub-stats" id="hubStats">
                <div class="stat-card">
                    <div class="number" id="totalSites">0</div>
                    <div class="label">Sites</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="totalCategories">0</div>
                    <div class="label">Catégories</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="totalVisits">0</div>
                    <div class="label">Visites</div>
                </div>
            </div>

            <!-- Categories & Cards -->
            <div id="hubContent"></div>

        </div>

    </div>

    <!-- ═══════════ MODAL ═══════════ -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <h2><i class="fas fa-plus-circle"></i> Ajouter un site</h2>
            <p class="sub">Ajoute un nouveau lien vers l'un de tes outils</p>

            <input type="text" id="modalName" placeholder="Nom du site" />
            <input type="text" id="modalUrl" placeholder="URL (ex: https://...)" />
            <select id="modalCategory">
                <option value="Principaux">⭐ Principaux</option>
                <option value="Outils">🛠️ Outils</option>
                <option value="IA">🤖 IA</option>
                <option value="Réseaux">🌐 Réseaux</option>
                <option value="Travail">💼 Travail</option>
                <option value="Divertissement">🎮 Divertissement</option>
                <option value="Autre">📁 Autre</option>
            </select>
            <select id="modalIcon">
                <option value="fa-globe">🌍 Globe</option>
                <option value="fa-code">💻 Code</option>
                <option value="fa-brain">🧠 IA</option>
                <option value="fa-shopping-cart">🛒 Shopping</option>
                <option value="fa-video">🎬 Vidéo</option>
                <option value="fa-music">🎵 Musique</option>
                <option value="fa-book">📚 Livre</option>
                <option value="fa-cog">⚙️ Outil</option>
                <option value="fa-chart-line">📊 Stats</option>
                <option value="fa-envelope">📧 Email</option>
                <option value="fa-calendar">📅 Calendrier</option>
                <option value="fa-star">⭐ Favori</option>
            </select>

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Annuler</button>
                <button class="btn-confirm" onclick="addSite()">Ajouter</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- ──────────────────────────────────────────────── -->
    <!-- JAVASCRIPT -->
    <!-- ──────────────────────────────────────────────── -->

    <script>
        // ──────────────── DATA ────────────────
        let sites = [];
        let visitCount = 0;

        // ──────────────── LOAD / SAVE ────────────────
        function loadData() {
            const saved = localStorage.getItem('portailSites');
            if (saved) {
                try {
                    sites = JSON.parse(saved);
                } catch (e) {
                    sites = [];
                }
            } else {
                // Sites par défaut
                sites = [
                    { name: 'Smart Budget', url: 'https://hamza-tuncay23.github.io/Budget/', category: 'Principaux',
                        icon: 'fa-wallet' },
                    { name: 'GitHub', url: 'https://github.com/hamza-tuncay23', category: 'Outils', icon: 'fa-github' },
                    { name: 'ChatGPT', url: 'https://chatgpt.com', category: 'IA', icon: 'fa-robot' },
                    { name: 'YouTube', url: 'https://youtube.com', category: 'Divertissement', icon: 'fa-youtube' },
                    { name: 'Gmail', url: 'https://gmail.com', category: 'Réseaux', icon: 'fa-envelope' },
                ];
            }
            const visits = localStorage.getItem('portailVisits');
            if (visits) {
                try {
                    visitCount = parseInt(visits) || 0;
                } catch (e) {
                    visitCount = 0;
                }
            }
            renderHub();
        }

        function saveData() {
            localStorage.setItem('portailSites', JSON.stringify(sites));
            localStorage.setItem('portailVisits', String(visitCount));
        }

        // ──────────────── ENTRY / EXIT ────────────────
        function enterHub() {
            document.getElementById('entryScreen').style.display = 'none';
            document.getElementById('hubScreen').classList.add('active');
            visitCount++;
            saveData();
            renderHub();
            showToast('🚀 Bienvenue dans ton hub !');
        }

        function exitHub() {
            document.getElementById('hubScreen').classList.remove('active');
            document.getElementById('entryScreen').style.display = 'flex';
        }

        // ──────────────── RENDER ────────────────
        function renderHub() {
            const container = document.getElementById('hubContent');
            const categories = [...new Set(sites.map(s => s.category))];

            document.getElementById('totalSites').textContent = sites.length;
            document.getElementById('totalCategories').textContent = categories.length;
            document.getElementById('totalVisits').textContent = visitCount;

            if (sites.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-plus-circle"></i>
                        <p>Aucun site pour le moment. Ajoute ton premier lien !</p>
                        <button class="enter-btn" style="margin-top:16px;padding:12px 32px;font-size:16px;" onclick="openModal()">
                            <i class="fas fa-plus"></i> Ajouter un site
                        </button>
                    </div>
                `;
                return;
            }

            let html = '';
            categories.forEach(cat => {
                const catSites = sites.filter(s => s.category === cat);
                const icons = {
                    'Principaux': 'fa-star',
                    'Outils': 'fa-tools',
                    'IA': 'fa-brain',
                    'Réseaux': 'fa-share-alt',
                    'Travail': 'fa-briefcase',
                    'Divertissement': 'fa-gamepad',
                    'Autre': 'fa-folder'
                };
                const icon = icons[cat] || 'fa-folder';

                html += `
                    <div class="category-section">
                        <div class="cat-title">
                            <i class="fas ${icon}"></i>
                            ${cat}
                            <span class="count">${catSites.length}</span>
                        </div>
                        <div class="card-grid">
                `;

                catSites.forEach((site, index) => {
                    const badgeColors = ['primary', 'green', 'purple', 'pink', 'orange', 'red'];
                    const badge = badgeColors[index % badgeColors.length];
                    html += `
                        <a href="${site.url}" target="_blank" class="card-link" onclick="trackClick('${site.name}')">
                            <span class="badge ${badge}">${cat}</span>
                            <div class="icon"><i class="fas ${site.icon || 'fa-globe'}"></i></div>
                            <div class="name">${site.name}</div>
                            <div class="desc">${site.url.replace(/^https?:\/\//, '').split('/')[0]}</div>
                        </a>
                    `;
                });

                // Bouton ajouter dans la catégorie
                html += `
                        <div class="add-card" onclick="openModal('${cat}')">
                            <i class="fas fa-plus-circle"></i>
                            <span>Ajouter</span>
                        </div>
                    </div>
                </div>
                `;
            });

            container.innerHTML = html;
        }

        // ──────────────── TRACK CLICKS ────────────────
        function trackClick(name) {
            console.log('🔗 Clic sur :', name);
            // On pourrait ajouter des statistiques ici
        }

        // ──────────────── MODAL ────────────────
        let modalCategory = 'Principaux';

        function openModal(category) {
            if (category) {
                modalCategory = category;
                document.getElementById('modalCategory').value = category;
            } else {
                modalCategory = document.getElementById('modalCategory').value;
            }
            document.getElementById('addModal').classList.add('active');
            document.getElementById('modalName').focus();
            document.getElementById('modalName').value = '';
            document.getElementById('modalUrl').value = '';
        }

        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        function addSite() {
            const name = document.getElementById('modalName').value.trim();
            let url = document.getElementById('modalUrl').value.trim();
            const category = document.getElementById('modalCategory').value;
            const icon = document.getElementById('modalIcon').value;

            if (!name) {
                showToast('❌ Veuillez entrer un nom.');
                return;
            }

            if (!url) {
                showToast('❌ Veuillez entrer une URL.');
                return;
            }

            // Ajouter https:// si absent
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            sites.push({ name, url, category, icon });
            saveData();
            renderHub();
            closeModal();
            showToast('✅ Site ajouté : ' + name);
        }

        // ──────────────── TOAST ────────────────
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.remove('hidden');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.classList.add('hidden'), 3000);
        }

        // ──────────────── KEYBOARD SHORTCUTS ────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('addModal').classList.contains('active')) {
                    closeModal();
                }
            }
            if (e.key === 'Enter' && document.getElementById('addModal').classList.contains('active')) {
                addSite();
            }
        });

        // ──────────────── INIT ────────────────
        loadData();
        console.log('🚀 Portail chargé !');
        console.log('📂 Sites :', sites.length);
    </script>

</body>
</html>
